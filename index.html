<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iznenadi</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #111827;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            max-width: 320px;
            padding: 20px;
        }
        .icon {
            width: 110px;
            height: 110px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 26px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 58px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3);
        }
        h1 {
            font-size: 42px;
            font-weight: 800;
            margin: 0 0 8px;
            letter-spacing: -1px;
        }
        p {
            color: #64748b;
            margin: 0 0 35px;
            font-size: 17px;
        }
        .download-btn {
            display: block;
            background: #007AFF;
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 22px;
            padding: 22px 0;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgb(0 122 255 / 0.4);
        }
        .download-btn:active {
            background: #0056cc;
            transform: scale(0.98);
        }
        .file-info {
            font-size: 12px;
            color: #64748b;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            🎁
        </div>
        
        <h1>Iznenadi</h1>
        <p>Prava iOS aplikacija</p>
        
        <!-- SAMO JEDAN KLIK -->
        <a href="Iznenadi-1.3.2.ipa" download class="download-btn">
            Preuzmi aplikaciju
        </a>
        
        <div class="file-info">Iznenadi-1.3.2.ipa</div>
    </div>
</body>
</html>
